[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bearer-openai"
version = "0.1.0"
description = "A thin OpenAI-compatible client for enterprise gateways that authenticate with a bearer token instead of an API key."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "Mumit" }]
keywords = ["openai", "llm", "bearer", "gateway", "proxy", "enterprise"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "openai>=1.30,<2",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-mock>=3", "respx>=0.21", "httpx>=0.27"]

[project.urls]
Homepage = "https://github.com/telus-labs/bearer-openai"
Issues = "https://github.com/telus-labs/bearer-openai/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/bearer_openai"]
