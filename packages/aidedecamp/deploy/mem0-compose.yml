# NOTE: superseded by deploy/compose.yml (the full stack: Qdrant + the
# assistant behind a --profile). This file is kept because docs and decisions
# link to it; new setups should use compose.yml.
#
# Self-hosted Mem0 for Aide-de-camp.
#
# This stands up a local memory substrate: Qdrant (vector store) plus the Mem0
# API server. The IMPORTANT part is that Mem0's extraction LLM and embedder must
# point at Fuel iX, not OpenAI — otherwise memory operations quietly send your
# data out through an unmanaged path. That wiring is done in code via
# aidedecamp.memory.build_mem0_config(); this compose file is the infra beneath it.
#
# Usage:
#   cp ../../.env.example ../../.env   # fill FUELIX_TOKEN
#   docker compose -f deploy/mem0-compose.yml up -d
#
# Then in the app:
#   from aidedecamp.memory import Mem0Store, build_mem0_config
#   store = Mem0Store(build_mem0_config(vector_store={
#       "provider": "qdrant",
#       "config": {"host": "localhost", "port": 6333,
#                  "collection_name": "aidedecamp",
#                  "embedding_model_dims": 1536}}))
#
# NOTE ON EMBEDDINGS: Fuel iX serves OpenAI embedding models directly
# (text-embedding-3-small @1536, text-embedding-3-large @3072, ada-002 @1536),
# so no local embedder is needed. Pick one via build_mem0_config(embedding_model=...)
# and the vector store dims are derived automatically — you cannot get the
# dims/model coupling wrong. Default is 3-small @1536. Switching to 3-large is a
# collection recreate (3072 != 1536), not a hot swap.

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Optional: only if you want the standalone Mem0 REST server rather than the
  # in-process library (aidedecamp uses the library by default). Left here for
  # the browser-based memory-correction UI in a later phase.
  # mem0:
  #   image: mem0/mem0-api-server:latest
  #   depends_on: [qdrant]
  #   environment:
  #     - OPENAI_BASE_URL=https://api.fuelix.ai
  #     - OPENAI_API_KEY=${FUELIX_TOKEN}
  #   ports:
  #     - "8000:8000"
  #   restart: unless-stopped

volumes:
  qdrant_data:
