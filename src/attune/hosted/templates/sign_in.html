<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Attune</title>
    <link rel="stylesheet" href="/assets/attune.css">
  </head>
  <body>
    <main>
      <p class="eyebrow">ATTUNE</p>
      <h1>Your workday, in tune.</h1>
      <p class="summary">
        Sign in to connect and manage your private workspace assistant.
      </p>
      <button id="google-sign-in" type="button" disabled>
        Continue with Google
      </button>
      <p id="status" role="status" aria-live="polite">
        Preparing secure sign-in…
      </p>
      <p class="privacy">
        Signing in identifies your Attune account. Access to Gmail, Calendar,
        Chat, or other Workspace data requires a separate consent step.
      </p>
    </main>
    <script type="module" src="/assets/identity.js"></script>
  </body>
</html>
